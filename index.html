<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Game Final</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
}

.rgb{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(45deg,red,blue,lime,magenta,orange);
    background-size:400% 400%;
    animation:rgb 6s linear infinite;
    filter:blur(25px);
    z-index:-1;
}

@keyframes rgb{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.page{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
}
.active{display:flex !important;}

.card{
    background:rgba(0,0,0,0.75);
    padding:20px;
    border-radius:15px;
    text-align:center;
    width:270px;
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:center;
}

#selamat{
    transform:scale(0.5);
    opacity:0;
}
#selamat.active{
    animation:slow 2.5s ease forwards;
}

@keyframes slow{
    0%{transform:scale(0.5);opacity:0;}
    100%{transform:scale(1);opacity:1;}
}

button{
    width:75%;
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

input{
    width:75%;
    padding:8px;
    border-radius:8px;
    border:none;
    text-align:center;
}

.bank{
    width:75%;
    padding:8px;
    background:white;
    color:black;
    border-radius:8px;
    cursor:pointer;
}

.menu{
    position:fixed;
    top:10px;
    right:15px;
    font-size:26px;
    cursor:pointer;
}

.close{
    position:absolute;
    top:6px;
    left:50%;
    transform:translateX(-50%);
    cursor:pointer;
}

.slot{
    display:flex;
    gap:8px;
}

.reel{
    width:55px;
    height:55px;
    background:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    font-size:20px;
}

.balance{
    position:fixed;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.5);
    padding:6px 10px;
    border-radius:8px;
}

.flash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    top:0;
    left:0;
    z-index:999;
    opacity:0;
    pointer-events:none;
}

/* HISTORY */
#history{
    margin-top:10px;
    font-size:12px;
    max-height:120px;
    overflow:auto;
    text-align:left;
    width:100%;
}

@keyframes shake {
    0%{transform:translate(0,0);}
    20%{transform:translate(-10px,10px);}
    40%{transform:translate(10px,-10px);}
    60%{transform:translate(-10px,5px);}
    80%{transform:translate(10px,-5px);}
    100%{transform:translate(0,0);}
}

.shake{
    animation:shake 0.3s infinite;
}
</style>
</head>

<body>

<div class="rgb"></div>
<div class="flash" id="flash"></div>

<div class="balance">
💰 <span id="saldo">0</span> | 🎰 Free <span id="free">1</span>
</div>

<div class="menu" onclick="show('menu')">⋮</div>

<audio id="scareSound">
    <source src="https://mighty-maroon-vfjqcktbaf.edgeone.app/ssstik.io_1778639529277%20(1).mp3">
</audio>

<!-- HOME -->
<div class="page active" id="home">
    <div class="card" id="selamat">
        <h2>🎉 SELAMAT!</h2>
        <p>Kamu dapat Rp 500.000</p>
        <button onclick="show('pay')">KLAIM</button>
    </div>
</div>

<!-- PAYMENT -->
<div class="page" id="pay">
    <div class="card">
        <h3>Pilih Metode</h3>
        <div class="bank" onclick="show('withdraw')">Dana</div>
        <div class="bank" onclick="show('withdraw')">GoPay</div>
        <div class="bank" onclick="show('withdraw')">OVO</div>
    </div>
</div>

<!-- WITHDRAW -->
<div class="page" id="withdraw">
    <div class="card">
        <div class="close" onclick="show('pay')">✖</div>
        <h3>Nomor</h3>
        <input id="no" placeholder="08xxxx">
        <button onclick="proses()">PROSES</button>
    </div>
</div>

<!-- MENU -->
<div class="page" id="menu">
    <div class="card">
        <h3>📋 MENU</h3>
        <button onclick="show('home')">🏠 HOME</button>
        <button onclick="show('spin')">🎰 SPIN</button>
    </div>
</div>

<!-- SPIN -->
<div class="page" id="spin">
    <div class="card">
        <div class="close" onclick="show('menu')">✖</div>
        <h3>SPIN</h3>

        <div class="slot">
            <div class="reel" id="r1">❔</div>
            <div class="reel" id="r2">❔</div>
            <div class="reel" id="r3">❔</div>
        </div>

        <button onclick="spin()">SPIN</button>
        <div id="hasil"></div>

        <!-- HISTORY -->
        <div id="history"></div>
    </div>
</div>

<!-- JUMPSCARE -->
<div class="page" id="scare">
    <img src="https://img.sanishtech.com/u/cc45c344097fbc05da8d7d408db4c764.jpg"
    style="width:100%;height:100%;object-fit:cover;">
</div>

<script>

let saldo=0;
let free=1;

/* SELAMAT */
window.onload=()=>{
    setTimeout(()=>{
        document.getElementById("selamat").classList.add("active");
    },300);
}

/* NAV + JUMPSCARE */
function show(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    if(id === "scare"){
        let audio = document.getElementById("scareSound");
        audio.volume = 1;
        audio.currentTime = 0;

        setTimeout(()=>audio.play().catch(()=>{}),300);

        let flash = document.getElementById("flash");
        flash.style.opacity="1";
        setTimeout(()=>flash.style.opacity="0",150);

        document.body.classList.add("shake");
        setTimeout(()=>document.body.classList.remove("shake"),2000);
    }
}

/* PROSES */
function proses(){
    if(!document.getElementById("no").value){
        return alert("Isi nomor!");
    }

    document.querySelector("#withdraw .card").innerHTML=`
        <div class="close" onclick="show('pay')">✖</div>
        <h3>🔄 Lagi sedang memproses...</h3>
        <p>Mohon tunggu sebentar</p>
    `;

    setTimeout(()=>{
        show("scare");
    },2500);
}

/* SPIN + HISTORY */
function spin(){

    if(free<=0 && saldo<5){
        return alert("Saldo kurang");
    }

    let s=["🍒","🍋","🔔","💀","💎","7️⃣"];

    let a=Math.floor(Math.random()*s.length);
    let b=Math.floor(Math.random()*s.length);
    let c=Math.floor(Math.random()*s.length);

    document.getElementById("r1").innerText=s[a];
    document.getElementById("r2").innerText=s[b];
    document.getElementById("r3").innerText=s[c];

    let result="";

    if(free>0){
        free--;
        result="🎟️ FREE SPIN";
    } else {
        saldo -= 5;
        result="💸 -5 SALDO";
    }

    if(a===b && b===c){
        saldo += 50;
        result="🎉 JACKPOT +50";
    }
    else if(a===b || b===c || a===c){
        saldo += 10;
        result="✨ HAMPIR MENANG +10";
    }
    else{
        saldo += 2;
        result="❌ ZONK +2 BONUS";
    }

    document.getElementById("saldo").innerText=saldo;
    document.getElementById("free").innerText=free;
    document.getElementById("hasil").innerText=result;

    let h=document.getElementById("history");
    let div=document.createElement("div");
    div.innerText=`${s[a]} ${s[b]} ${s[c]} → ${result}`;
    h.prepend(div);
}

</script>

</body>
</html>
